            <figure class="block">

                    alt="Iconic red and white striped horseshoe arches inside the Mezquita-Cathedral" width="1920"
                    height="2560" loading="lazy" class="feature-image feature-image-portrait">
                <figcaption>The famous Mezquita-Cathedral was built under Abd al-Rahman I, one of the few surviving
                    members of the Umayyad dynasty after the Abbasid Revolution. Sheltered by Amazigh tribesmen during
                    his flight across North Africa, he escaped to Muslim Iberia and founded the Emirate of Córdoba,
                    which later became the Caliphate of Córdoba — under which the city grew to be the second largest in
                    Europe.</figcaption>
            </figure>

            <figure class="block">
                <img src="/images/cordoba/SOM07498.JPG"
                    alt="Exterior wall of the Mezquita with intricate horseshoe arch carving against blue sky"
                    width="1920" height="1440" loading="lazy" class="feature-image feature-image-landscape">
                <figcaption>A remarkably tolerant society for its age, where Muslims, Christians, and Jews lived and
                    worked alongside one another. It was through this melting pot that the works of the Greek
                    philosophers such as Aristotle, Plato, and Archimedes were reintroduced to European thought — having
                    been translated from Greek into Arabic in Baghdad, and from Arabic into Latin in Iberia.
                </figcaption>
            </figure>
