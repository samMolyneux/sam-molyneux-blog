    <main class="post">
        <article>
            <hgroup>
                <h1>Chefchaouen to Tetouan</h1>
                <p>March 10th 2026</p>
            </hgroup>
            <p><small>Published March 17th 2026</small></p>

            <figure class="block">
                <img src="/images/chefchaouen_to_tetouan/SOM06272.JPG"
                    alt="Mountain road curving toward snow-covered peaks under heavy cloud"
                    class="feature-image feature-image-landscape">

                <figcaption>Having dealt with torrential rain and a puncture even before picking up my laundry on the
                    way out of Chefchaouen, the skies clearing as I got to the highest point of the day was very
                    welcome.</figcaption>
            </figure>

            <figure class="block">
                <img src="/images/chefchaouen_to_tetouan/SOM06278.JPG"
                    alt="Towering limestone cliffs with a small building nestled at their base"
                    class="feature-image feature-image-landscape">
            </figure>

            <figure class="block">
                <img src="/images/chefchaouen_to_tetouan/SOM06281.JPG"
                    alt="Winding road through a deep green valley with clouds hugging the peaks"
                    class="feature-image feature-image-landscape">
                <figcaption>This is around when the inner tube I'd put in earlier developed a puncture (almost certainly
                    due to poor execution on my part), at least
                    it was pretty where I stopped to put in my final backup with some lunch.
                </figcaption>
            </figure>


            <figure class="block">
                <img src="/images/chefchaouen_to_tetouan/SOM06288.JPG"
                    alt="Hilltop view over the Mediterranean coast with Spain faintly visible"
                    class="feature-image feature-image-landscape">
                <figcaption>And shortly after this my hastily repaired chain gave in and I hailed a taxi with the help
                    of some guys outside a shop after rolling down the hill to Tamernout.</figcaption>

            </figure>

            <figure class="block">
                <img src="/images/chefchaouen_to_tetouan/PXL_20260310_175130789.jpg"
                    alt="Man loading a bike onto the roof rack of a small blue taxi"
                    class="feature-image feature-image-portrait">
                <figcaption> Taxi driver was understandably in a bit of a
                    rush to get home for iftar but came round eventually - I think he was initially under the impression
                    I just got lazy.</figcaption>
            </figure>

        </article>
