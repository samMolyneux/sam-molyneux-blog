            <hgroup>
                <h1>Fes to Chefchaouen</h1>
                <p>March 6th to 8th 2026</p>
            </hgroup>
            <p><small>Published March 17th 2026</small></p>

            <figure class="block">
                <img src="/images/fes_to_chefchaouen/PXL_20260306_161443977 (1).jpg"
                    alt="Green hillside sloping down to a large lake with mountains beyond"
                    class="feature-image feature-image-landscape">
                <figcaption>Steep climbs along the edge of the reservoir completed with plenty of encouragement from
                    hordes of children leaving school.</figcaption>
            </figure>

            <figure class="block">
                <img src="/images/fes_to_chefchaouen/PXL_20260306_172805145.jpg"
                    alt="Road overlooking a lake at dusk with storm clouds and distant rain"
                    class="feature-image feature-image-landscape">
            </figure>

            <figure class="block">
                <img src="/images/fes_to_chefchaouen/SOM06105.JPG"
                    alt="Sleeping bag and camping stove set up inside a small storage room"
                    class="feature-image feature-image-landscape">
                <figcaption>The auberge I'd planned to stay in was abandoned but they'd left a room open. I wasn't aware
                    I was sharing with a cat until it decided to leave in a hurry around 6am.</figcaption>
            </figure>

            <figure class="block">
                <img src="/images/fes_to_chefchaouen/PXL_20260307_130900759.jpg"
                    alt="Foggy town street crowded with cars and people in hooded jackets"
                    class="feature-image feature-image-landscape">
                <figcaption>My chain broke on the way up to Bni Ahmed, huge thanks to Abdel who took me up and down the
                    busy
                    town spread along a single street until we found a car mechanic who could get me going again (fix
                    involved a hammer and 6 spectators).
                </figcaption>
            </figure>

            <figure class="block">
                <img src="/images/fes_to_chefchaouen/SOM06123.JPG"
                    alt="Green tent pitched among bushes with snow-capped Rif mountains behind"
                    class="feature-image feature-image-landscape">
                <figcaption>A favourite camp spot, secluded well above the road with mountains in all directions.
                </figcaption>
            </figure>

            <figure class="block">
                <img src="/images/fes_to_chefchaouen/SOM06133.JPG"

                    class="feature-image feature-image-landscape">
