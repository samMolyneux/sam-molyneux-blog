        <article>
            <hgroup>
                <h1>Granada to Cordoba</h1>
                <p>April 14th to 15th 2026</p>
            </hgroup>
            <p><small>Published <time datetime="2026-04-30">April 30th 2026</time></small></p>

            <figure class="block">
                <img src="/images/granada_to_cordoba/SOM07258.JPG"
                    alt="Workers tending a green field crop with hills and a distant town behind" width="1920"
                    height="2560" class="feature-image feature-image-portrait">
            </figure>

            <figure class="block">
                <img src="/images/granada_to_cordoba/SOM07268.JPG"
                    alt="Camino way markers with yellow arrows on a whitewashed gate post" width="1920" height="2560"
                    loading="lazy" class="feature-image feature-image-portrait">
                <figcaption>The Camino Mozarabe de Santiago was the pilgrimage route traditionally followed by
                    'Mozarabs' - Arabic speaking Christians. This meant two days with lots of steep gravel climbs and
                    lots of
                    history.</figcaption>
            </figure>

            <figure class="block">
                <img src="/images/granada_to_cordoba/SOM07282.JPG"
                    alt="Country lane leading toward the snow capped Sierra Nevada with a tall lattice mast"
                    width="1920" height="1440" loading="lazy" class="feature-image feature-image-landscape">
            </figure>

            <figure class="block">
                <img src="/images/granada_to_cordoba/SOM07311.JPG"
                    alt="Rocky outcrop with castle ruins and the snow capped Sierra Nevada beyond" width="1920"
                    height="1440" loading="lazy" class="feature-image feature-image-landscape">
                <figcaption>The region was highly contested in the Middle Ages. In 1280 a battle known as the 'Disaster
                    of Moclín' took place in the valley on the left of this picture. A Christian force of the Order of
                    Santiago was
                    surrounded and defeated by Nasrid forces from the Emirate of Granada.</figcaption>
            </figure>

            <figure class="block">
                <img src="/images/granada_to_cordoba/SOM07317.JPG"
                    alt="Wild rabbit at the entrance of its burrow in a sandy bank" width="1920" height="1440"
                    loading="lazy" class="feature-image feature-image-landscape">
                <figcaption>This rabbit posed happily for me for multiple minutes as cars went by at high speed.
                </figcaption>
            </figure>

            <figure class="block">
                <img src="/images/granada_to_cordoba/SOM07331.JPG"
                    alt="Hilltop castle towering above a hillside of olive groves and patchwork fields" width="1920"
                    height="2560" loading="lazy" class="feature-image feature-image-portrait">
            </figure>

            <figure class="block">
                <img src="/images/granada_to_cordoba/SOM07350.JPG"
                    alt="Flamingos wading in a shallow lake below olive covered hills" width="1920" height="2560"
                    loading="lazy" class="feature-image feature-image-portrait">
            </figure>

            <figure class="block">
                <img src="/images/granada_to_cordoba/SOM07352.JPG"
                    alt="Three cyclists on a road beneath a hillside of regimented olive trees" width="1920"
                    height="2560" loading="lazy" class="feature-image feature-image-portrait">
            </figure>

            <figure class="block">
                <img src="/images/granada_to_cordoba/SOM07365.JPG"
                    alt="Cafe courtyard with a Cruzcampo parasol and potted plants" width="1920" height="1440"
                    loading="lazy" class="feature-image feature-image-landscape">
                <figcaption>The architectural blend of Moorish and European styles is pervasive</figcaption>
            </figure>

            <figure class="block">
                <img src="/images/granada_to_cordoba/SOM07371.JPG"
                    alt="Rows of olive trees rolling over the contours of an Andalucian hill" width="1920" height="1440"
                    loading="lazy" class="feature-image feature-image-landscape">
            </figure>

            <figure class="block">
                <img src="/images/granada_to_cordoba/SOM07375.JPG"
                    alt="Whitewashed cortijo farmhouse on a low ridge above bright green spring fields" width="1920"
                    height="2560" loading="lazy" class="feature-image feature-image-portrait">
            </figure>

            <figure class="block">
                <img src="/images/granada_to_cordoba/SOM07383.JPG"
                    alt="Empty road stretching into rolling green farmland under wispy cloud" width="1920" height="2560"
                    loading="lazy" class="feature-image feature-image-portrait">
                <figcaption>Coming down with a mild illness and dealing with multiple mechanical issues over the course
                    of the day, I was slightly delirious arriving in Cordoba through fields and olive groves in the
                    evening light.</figcaption>
            </figure>
